# iot-prometheus — the IoT-stack's own Prometheus (separate from spectra-io's
# spectra-prometheus). Scrapes the Node-RED /metrics exporter (System Health KPIs).
global:
  scrape_interval: 30s
  scrape_timeout: 10s
  evaluation_interval: 30s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: nodered-metrics
    metrics_path: /metrics
    static_configs:
      - targets: ['iot-nodered:1880']   # the stack's Node-RED exporter
        labels:
          service: nodered-metrics
