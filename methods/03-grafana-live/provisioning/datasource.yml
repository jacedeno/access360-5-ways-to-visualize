# Grafana provisioning for the ACCESS360 MQTT data source (Grafana Live).
# Drop into Grafana's provisioning/datasources/ dir, or apply the equivalent via
# the API (see deploy/deploy.sh). Requires the grafana-mqtt-datasource plugin.
#
# The URI points at the broker by its in-network hostname so Grafana streams
# straight from HiveMQ — no database in the path.
apiVersion: 1

datasources:
  - name: ACCESS360 MQTT
    uid: access360-mqtt
    type: grafana-mqtt-datasource
    access: proxy
    isDefault: false
    editable: true
    jsonData:
      uri: tcp://iot-hivemq:1883     # or tcp://192.168.68.150:1883 from outside the iot network
