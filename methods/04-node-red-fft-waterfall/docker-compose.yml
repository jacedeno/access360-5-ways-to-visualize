# Method 4 — standalone Node-RED FFT/waterfall, deployable on host 192.168.68.150.
#
# Joins the existing `iot` Docker network so the broker resolves as `iot-hivemq`
# (the hostname flow.json's mqtt-broker config uses). If you run this OUTSIDE that
# network, either keep `iot` external below, or edit the mqtt-broker node to point
# at 192.168.68.150:1883.
#
#   docker compose up -d --build
#   open http://192.168.68.150:1880/        (flow editor — import flow.json once)
#   open http://192.168.68.150:1880/ui      (dashboard: spectrum + waterfall)
#
# First run: Editor -> menu -> Import -> select flow.json -> Deploy.
# The fixtures dir is mounted read-only so the "Load fixture" inject works offline.

services:
  node-red-fft:
    build: .
    container_name: iot-node-red-fft
    restart: unless-stopped
    ports:
      - "1880:1880"
    volumes:
      - node_red_fft_data:/data
      - ./fixtures:/data/fixtures:ro
    networks:
      - iot

volumes:
  node_red_fft_data:

networks:
  iot:
    external: true
